name: Autoresearch Strategy Update

on:
  schedule:
    # 09:45 Europe/Istanbul (UTC+3) every day
    - cron: "45 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: linkedin-autoresearch-update
  cancel-in-progress: false

jobs:
  strategy-update:
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      TIMEZONE: Europe/Istanbul
      OUTPUT_DIR: data
      LEAD_MAGNET_SCHOOL_PATH: knowledge/lead_magnet_school.md
      RESEARCH_HISTORY_DAYS: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run research update
        run: python -m src.linkedin_leadmagnet.main research

      - name: Commit research artifacts
        shell: bash
        run: |
          if [ -z "$(git status --porcelain data/)" ]; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: autoresearch strategy update snapshot"
          git push
